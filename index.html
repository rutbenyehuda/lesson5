<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רכז נתוני מניות</title>
    <style>
        :root {
            --primary-pink: #d495a8;
            --hover-pink: #bf7a8e;
            --bg-color: #fcf7f8;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #6b6b6b;
            --input-border: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(212, 149, 168, 0.15); 
            width: 100%; 
            max-width: 500px; 
        }

        .header-texts { text-align: center; margin-bottom: 30px; }
        h2 { color: var(--text-main); margin: 0 0 5px 0; font-size: 26px; }
        p.subtitle { color: var(--text-muted); margin: 0; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main); font-size: 14px; }
        input, select { 
            width: 100%; padding: 12px 15px; border-radius: 8px; 
            border: 1px solid var(--input-border); box-sizing: border-box; 
            font-size: 15px; background-color: #fafafa; transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--primary-pink);
            background-color: #ffffff; box-shadow: 0 0 0 3px rgba(212, 149, 168, 0.2);
        }

        button.submit-btn { 
            background-color: var(--primary-pink); color: white; font-size: 16px; 
            border: none; cursor: pointer; margin-top: 10px; font-weight: bold; 
            width: 100%; padding: 14px; border-radius: 8px; transition: background-color 0.3s ease;
        }
        button.submit-btn:hover { background-color: var(--hover-pink); }

        #message-area { margin-top: 25px; text-align: center; border-radius: 8px; display: none; }
        .status-text { font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        .loading-text { color: var(--primary-pink); }
        .error-text { color: #dc3545; }
        
        .success-box { background-color: #f9f0f3; border: 1px solid #eed6df; padding: 20px; border-radius: 12px; }
        .success-title { color: var(--hover-pink); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .success-subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 15px; }

        .sheet-link-btn {
            display: inline-block; background-color: #2b2b2b; color: white;
            text-decoration: none; padding: 12px 20px; border-radius: 6px;
            font-weight: bold; font-size: 14px; transition: background-color 0.3s ease; width: 80%; margin-bottom: 15px;
        }
        .sheet-link-btn:hover { background-color: #404040; }

        /* עיצוב הטבלה המקדימה בסגנון ורוד */
        .preview-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .preview-table th { background-color: var(--primary-pink); color: white; padding: 8px; border: 1px solid #c98a9d; }
        .preview-table td { padding: 6px; border: 1px solid #eed6df; background-color: white; color: #333; }
        .preview-table tr:nth-child(even) td { background-color: #fdfafb; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-texts">
        <h2>יצירת גיליון מניות</h2>
        <p class="subtitle">מנוע איחוד נתונים ויצירת CSV</p>
    </div>
    
    <div class="form-group">
        <label>טיקרים (מופרדים בפסיק):</label>
        <input type="text" id="tickers" placeholder="לדוגמה: AAPL, MSFT" required>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label>תאריך התחלה:</label>
            <input type="date" id="startDate" required>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>תאריך סיום:</label>
            <input type="date" id="endDate" required>
        </div>
    </div>

    <div class="form-group">
        <label>תדירות דגימה:</label>
        <select id="frequency">
            <option value="1d">יומי (Daily)</option>
            <option value="1wk">שבועי (Weekly)</option>
            <option value="1mo">חודשי (Monthly)</option>
        </select>
    </div>

    <button class="submit-btn" onclick="sendData()">בצע איחוד והורד CSV</button>

    <div id="message-area"></div>
</div>

<script>
    // ----------------------------------------------------
    // הדביקי כאן את ה-Web App URL שלך מגוגל סקריפט!
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyE353Rrls566X1QL1IC6J5zIzzjXiGWc7tiXuASQc/dev';
    // ----------------------------------------------------

    async function sendData() {
        const messageArea = document.getElementById('message-area');
        const tickersInput = document.getElementById('tickers').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const frequency = document.getElementById('frequency').value;

        messageArea.style.display = 'block';
        
        if (!tickersInput || !startDate || !endDate) {
            messageArea.innerHTML = '<div class="status-text error-text">נא למלא את כל השדות.</div>';
            return;
        }

        const payload = {
            tickers: tickersInput.split(',').map(t => t.trim().toUpperCase()),
            startDate: startDate,
            endDate: endDate,
            frequency: frequency
        };

        messageArea.innerHTML = '<div class="status-text loading-text">⏳ מפיק קובץ CSV... המתן...</div>';

        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.status === "success") {
                // יצירת טבלת התצוגה המקדימה ב-HTML
                let tableHTML = '<table class="preview-table">';
                result.previewData.forEach((row, index) => {
                    tableHTML += '<tr>';
                    row.forEach(cell => {
                        let cellContent = cell !== undefined && cell !== null ? cell : "";
                        // שורה 0 היא הכותרת
                        if(index === 0) { tableHTML += `<th>${cellContent}</th>`; } 
                        else { tableHTML += `<td>${cellContent}</td>`; }
                    });
                    tableHTML += '</tr>';
                });
                tableHTML += '</table>';

                messageArea.innerHTML = `
                    <div class="success-box">
                        <div class="success-title">✓ קובץ ה-CSV מוכן!</div>
                        <div class="success-subtitle">הנתונים אוחדו בהצלחה. לחץ למטה כדי להוריד את הקובץ.</div>
                        <a href="${result.downloadUrl}" target="_blank" class="sheet-link-btn">⬇️ הורד קובץ CSV</a>
                        <div style="font-size:12px; font-weight:bold; margin-top:10px; color:var(--text-main);">תצוגה מקדימה:</div>
                        ${tableHTML}
                    </div>
                `;
            } else {
                messageArea.innerHTML = `<div class="status-text error-text">שגיאה: ${result.error}</div>`;
            }
        } catch (error) {
            messageArea.innerHTML = '<div class="status-text error-text">אירעה שגיאה בתקשורת עם השרת.</div>';
            console.error(error);
        }
    }
</script>

</body>
</html>
