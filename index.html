<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רכז נתוני מניות</title>
    <style>
        :root {
            --primary-pink: #d495a8; /* ורוד עתיק אלגנטי */
            --hover-pink: #bf7a8e;
            --bg-color: #fcf7f8;
            --card-bg: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #6b6b6b;
            --input-border: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            background-color: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(212, 149, 168, 0.15); 
            width: 100%; 
            max-width: 450px; 
        }

        .header-texts {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 { 
            color: var(--text-main); 
            margin: 0 0 5px 0;
            font-size: 26px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: var(--text-main); 
            font-size: 14px;
        }

        input, select { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid var(--input-border); 
            box-sizing: border-box; 
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-pink);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(212, 149, 168, 0.2);
        }

        button.submit-btn { 
            background-color: var(--primary-pink); 
            color: white; 
            font-size: 16px; 
            border: none; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: bold; 
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button.submit-btn:hover { 
            background-color: var(--hover-pink); 
        }

        button.submit-btn:active {
            transform: scale(0.98);
        }

        /* עיצוב אזור ההודעות */
        #message-area { 
            margin-top: 25px; 
            text-align: center; 
            border-radius: 8px;
            display: none; /* מוסתר כברירת מחדל */
        }

        .status-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .loading-text { color: var(--primary-pink); }
        .error-text { color: #dc3545; }
        
        /* עיצוב הודעת ההצלחה */
        .success-box {
            background-color: #f9f0f3;
            border: 1px solid #eed6df;
            padding: 20px;
            border-radius: 12px;
        }

        .success-title {
            color: var(--hover-pink);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .success-subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .sheet-link-btn {
            display: inline-block;
            background-color: #2b2b2b;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.3s ease;
            width: 80%;
        }

        .sheet-link-btn:hover {
            background-color: #404040;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-texts">
        <h2>יצירת גיליון מניות</h2>
        <p class="subtitle">מנוע אחזור ואיחוד נתונים</p>
    </div>
    
    <div class="form-group">
        <label>טיקרים (מופרדים בפסיק, למשל: AAPL,MSFT):</label>
        <input type="text" id="tickers" placeholder="לדוגמה: AAPL, MSFT" required>
    </div>

    <div style="display: flex; gap: 15px;">
        <div class="form-group" style="flex: 1;">
            <label>תאריך התחלה:</label>
            <input type="date" id="startDate" required>
        </div>

        <div class="form-group" style="flex: 1;">
            <label>תאריך סיום:</label>
            <input type="date" id="endDate" required>
        </div>
    </div>

    <div class="form-group">
        <label>תדירות דגימה:</label>
        <select id="frequency">
            <option value="1d">יומי (Daily)</option>
            <option value="1wk">שבועי (Weekly)</option>
            <option value="1mo">חודשי (Monthly)</option>
        </select>
    </div>

    <button class="submit-btn" onclick="sendData()">בצע איחוד וצור גיליון</button>

    <div id="message-area">
        </div>
</div>

<script>
    // ----------------------------------------------------
    // החליפי את המחרוזת למטה בקישור שקיבלת מגוגל!
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyS8UugcWguvIDyj8Gl8evdNEOyU3WaO_R6oTQ2I4Kobvx_V75cj1yEQYzs_hXRgAU5/exec';
    // ----------------------------------------------------

    async function sendData() {
        const messageArea = document.getElementById('message-area');
        const tickersInput = document.getElementById('tickers').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const frequency = document.getElementById('frequency').value;

        // איפוס תצוגה
        messageArea.style.display = 'block';
        messageArea.innerHTML = '';
        messageArea.className = '';

        if (!tickersInput || !startDate || !endDate) {
            messageArea.innerHTML = '<div class="status-text error-text">נא למלא את כל השדות.</div>';
            return;
        }

        const tickersArray = tickersInput.split(',').map(t => t.trim().toUpperCase());

        const payload = {
            tickers: tickersArray,
            startDate: startDate,
            endDate: endDate,
            frequency: frequency
        };

        // הצגת מצב טעינה
        messageArea.innerHTML = '<div class="status-text loading-text">⏳ מתקשר עם השרת ומעבד נתונים...</div>';

        try {
            // שליחה מאובטחת שעוקפת CORS
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8', 
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.success || result.status === "success") {
                // תצוגת ההצלחה המעוצבת
                messageArea.innerHTML = `
                    <div class="success-box">
                        <div class="success-title">✓ העיבוד הושלם בהצלחה!</div>
                        <div class="success-subtitle">הגיליון נוצר ב-Drive שלך ושותף לצפייה לכל מי שיש לו את הקישור.</div>
                        <a href="${result.sheetUrl}" target="_blank" class="sheet-link-btn">פתח את הגיליון ב-Google Sheets</a>
                    </div>
                `;
            } else {
                messageArea.innerHTML = `<div class="status-text error-text">שגיאה: ${result.error}</div>`;
            }
        } catch (error) {
            messageArea.innerHTML = '<div class="status-text error-text">אירעה שגיאה בתקשורת עם השרת. ודאי שכתובת ה-URL מעודכנת.</div>';
            console.error(error);
        }
    }
</script>

</body>
</html>
